<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF ID Checker - RDX STORE</title>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .container { background: #1f1f1f; padding: 20px; border-radius: 10px; display: inline-block; width: 90%; max-width: 400px; box-shadow: 0 0 15px rgba(255,0,0,0.2); }
        input { width: 80%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; outline: none; }
        button { padding: 10px 20px; background: #ff4b2b; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #result { margin-top: 20px; padding: 10px; border-top: 1px solid #333; display: none; }
        .loading { color: yellow; display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Verify Player ID</h2>
        <input type="number" id="player_id" placeholder="Enter Free Fire UID...">
        <br>
        <button onclick="checkID()">Check Name</button>

        <div id="loader" class="loading">Searching player...</div>

        <div id="result">
            <p style="color: #aaa;">Player Name:</p>
            <h3 id="player_name" style="color: #4bff2b;">---</h3>
        </div>
    </div>

    <script>
        function checkID() {
            const uid = document.getElementById('player_id').value;
            const resultDiv = document.getElementById('result');
            const nameH3 = document.getElementById('player_name');
            const loader = document.getElementById('loader');

            if (uid.length < 5) {
                alert("Please enter a valid UID");
                return;
            }

            // UI Updates
            loader.style.display = "block";
            resultDiv.style.display = "none";

            // Free API (Ye kabhi kabhi limit hone par slow ho sakti hai)
            // Hum ek public proxy use kar rahe hain takki data fetch ho sake
            fetch(`https://freefire-api-by-rdx.vercel.app/api/check?uid=${uid}`)
            .then(response => response.json())
            .then(data => {
                loader.style.display = "none";
                if (data.nickname) {
                    nameH3.innerText = data.nickname;
                    resultDiv.style.display = "block";
                } else {
                    alert("ID Not Found or Server Busy!");
                }
            })
            .catch(err => {
                loader.style.display = "none";
                alert("Error: Server not responding. Try again later.");
                console.error(err);
            });
        }
    </script>

</body>
</html>
