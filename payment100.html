<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF ID Checker - RDX STORE</title>
    <style>
        body { background-color: #0b0b0b; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #151515; padding: 25px; border-radius: 15px; width: 85%; max-width: 350px; text-align: center; border: 2px solid #ff4b2b; box-shadow: 0 0 20px rgba(255, 75, 43, 0.2); }
        h2 { color: #ff4b2b; margin-bottom: 15px; font-size: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #333; background: #222; color: white; font-size: 16px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 12px; background: #ff4b2b; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:active { transform: scale(0.95); }
        #loader { display: none; color: #ffeb3b; margin-top: 10px; font-size: 14px; }
        #result-box { margin-top: 20px; display: none; padding: 15px; background: #222; border-radius: 10px; border: 1px solid #444; }
        .name-label { font-size: 12px; color: #888; text-transform: uppercase; }
        .nickname { font-size: 20px; color: #00ffcc; font-weight: bold; margin-top: 5px; word-wrap: break-word; }
    </style>
</head>
<body>

    <div class="card">
        <h2>FF PLAYER CHECKER</h2>
        <input type="number" id="uidInput" placeholder="Enter Player UID here...">
        <button onclick="checkPlayer()">VERIFY ID</button>
        
        <div id="loader">Processing... Please wait</div>

        <div id="result-box">
            <div class="name-label">Player Nickname</div>
            <div id="playerNickname" class="nickname">---</div>
            <div style="color: #4bff2b; font-size: 11px; margin-top: 5px;">Data Verified Successfully</div>
        </div>
    </div>

    <script>
        async function checkPlayer() {
            const uid = document.getElementById('uidInput').value;
            const loader = document.getElementById('loader');
            const resBox = document.getElementById('result-box');
            const nickDisplay = document.getElementById('playerNickname');

            if (uid.length < 5) {
                alert("Please enter a valid UID!");
                return;
            }

            loader.style.display = "block";
            resBox.style.display = "none";

            try {
                // Ye API kaafi stable hai aur direct data fetch karti hai
                const response = await fetch(`https://api.vreden.my.id/api/freefire?id=${uid}`);
                const data = await response.json();

                loader.style.display = "none";

                // Check if nickname exists in the result
                if (data.status === 200 && data.result) {
                    nickDisplay.innerText = data.result;
                    resBox.style.display = "block";
                } else if (data.nickname) {
                     nickDisplay.innerText = data.nickname;
                     resBox.style.display = "block";
                } else {
                    alert("ID galat hai ya Garena server down hai!");
                }
            } catch (error) {
                loader.style.display = "none";
                alert("Technical Issue! Please try again in 1 minute.");
                console.error(error);
            }
        }
    </script>

</body>
</html>
