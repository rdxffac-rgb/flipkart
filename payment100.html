<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF ID Checker - RDX STORE</title>
    <style>
        /* Dark Theme Design */
        body { 
            background-color: #0f0f0f; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container { 
            background: #1a1a1a; 
            padding: 30px; 
            border-radius: 15px; 
            width: 90%; 
            max-width: 400px; 
            text-align: center;
            box-shadow: 0 8px 25px rgba(255, 0, 0, 0.3);
            border: 1px solid #333;
        }
        h2 { color: #ff4b2b; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 15px 0; 
            border-radius: 8px; 
            border: 1px solid #444; 
            background: #252525; 
            color: white; 
            font-size: 16px;
            box-sizing: border-box;
        }
        button { 
            width: 100%;
            padding: 12px; 
            background: linear-gradient(45deg, #ff4b2b, #ff0000); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px;
            transition: 0.3s;
        }
        button:hover { transform: scale(1.02); opacity: 0.9; }
        
        #result-box { 
            margin-top: 25px; 
            padding: 15px; 
            background: #252525;
            border-radius: 10px; 
            display: none; 
            border: 1px dashed #555;
        }
        .label { color: #aaa; font-size: 12px; text-transform: uppercase; }
        .player-name { color: #00ffcc; font-size: 22px; margin: 5px 0; font-weight: bold; }
        .loader { 
            display: none; 
            margin: 15px auto; 
            border: 4px solid #f3f3f3; 
            border-top: 4px solid #ff4b2b; 
            border-radius: 50%; 
            width: 30px; 
            height: 30px; 
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <h2>RDX ID CHECKER</h2>
        <p style="font-size: 14px; color: #888;">Enter UID to Verify Player</p>
        
        <input type="number" id="uidInput" placeholder="Ex: 3034931698">
        <button onclick="fetchPlayerName()">CHECK NOW</button>

        <div id="loading" class="loader"></div>

        <div id="result-box">
            <div class="label">Official Nickname</div>
            <div id="nickname" class="player-name">---</div>
            <div style="color: #4bff2b; font-size: 12px;">✅ Verified Player</div>
        </div>
    </div>

    <script>
        async function fetchPlayerName() {
            const uid = document.getElementById('uidInput').value;
            const resBox = document.getElementById('result-box');
            const nickDisplay = document.getElementById('nickname');
            const loader = document.getElementById('loading');

            if (uid.length < 5) {
                alert("Please enter a valid Free Fire UID");
                return;
            }

            // Show Loading
            loader.style.display = "block";
            resBox.style.display = "none";

            try {
                // Hum ek free public tool ki API use kar rahe hain jo nicknames deti hai
                const response = await fetch(`https://voda-api-ff.vercel.app/check?uid=${uid}`);
                const data = await response.json();

                loader.style.display = "none";

                if (data && data.nickname) {
                    nickDisplay.innerText = data.nickname;
                    resBox.style.display = "block";
                } else {
                    alert("Player not found! Please check the UID.");
                }
            } catch (error) {
                loader.style.display = "none";
                alert("Server Error! Try again after some time.");
                console.error("Error fetching data:", error);
            }
        }
    </script>

</body>
</html>
