<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RDX FF CHECKER</title>
    <style>
        /* Design: Dark and Professional */
        body { 
            background-color: #0a0a0a; 
            color: white; 
            font-family: 'Arial', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .main-card { 
            background: #161616; 
            padding: 25px; 
            border-radius: 12px; 
            width: 320px; 
            text-align: center; 
            border: 1px solid #ff4b2b; 
            box-shadow: 0 5px 15px rgba(255, 75, 43, 0.2);
        }
        h2 { color: #ff4b2b; font-size: 18px; margin-bottom: 20px; }
        input { 
            width: 90%; 
            padding: 12px; 
            margin-bottom: 15px; 
            border-radius: 6px; 
            border: 1px solid #333; 
            background: #222; 
            color: white; 
            outline: none;
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background: #ff4b2b; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            font-weight: bold; 
            cursor: pointer; 
        }
        #loading-text { display: none; color: #ffeb3b; margin-top: 10px; font-size: 13px; }
        
        /* Result Box */
        #data-box { 
            margin-top: 20px; 
            display: none; 
            padding: 15px; 
            background: #222; 
            border-radius: 8px; 
            border: 1px solid #444; 
        }
        .small-txt { font-size: 11px; color: #888; text-transform: uppercase; }
        .player-nick { font-size: 18px; color: #00ffcc; font-weight: bold; margin-top: 4px; }
    </style>
</head>
<body>

    <div class="main-card">
        <h2>RDX PLAYER SEARCH</h2>
        <input type="number" id="ff_id" placeholder="Enter Free Fire UID">
        <button onclick="checkNow()">GET DETAILS</button>
        
        <div id="loading-text">Searching in Garena Database...</div>

        <div id="data-box">
            <div class="small-txt">Player Nickname</div>
            <div id="display_name" class="player-nick">---</div>
        </div>
    </div>

    <script>
        async function checkNow() {
            const uid = document.getElementById('ff_id').value;
            const loader = document.getElementById('loading-text');
            const resultBox = document.getElementById('data-box');
            const nameField = document.getElementById('display_name');

            if (uid.length < 5) {
                alert("Bhai sahi UID dalo!");
                return;
            }

            loader.style.display = "block";
            resultBox.style.display = "none";

            try {
                // Ye ek backup free API hai jo bina hosting ke chalti hai
                const response = await fetch(`https://freefire-api-by-voda.vercel.app/api/check?uid=${uid}`);
                const data = await response.json();

                loader.style.display = "none";

                if (data && data.nickname) {
                    nameField.innerText = data.nickname;
                    resultBox.style.display = "block";
                } else {
                    alert("ID nahi mili! Dobara check karein.");
                }
            } catch (err) {
                loader.style.display = "none";
                alert("Server busy hai, 1 minute baad try karein.");
                console.log(err);
            }
        }
    </script>

</body>
</html>
