<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RDX FF VERIFY</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .box { background: #111; padding: 25px; border-radius: 15px; border: 1px solid #ff4b2b; display: inline-block; width: 300px; }
        input { width: 90%; padding: 12px; margin: 15px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; outline: none; }
        button { width: 100%; padding: 12px; background: #ff4b2b; border: none; color: #fff; font-weight: bold; border-radius: 8px; cursor: pointer; }
        #loader { display: none; margin-top: 15px; color: #ffeb3b; }
        #res { display: none; margin-top: 20px; background: #222; padding: 15px; border-radius: 10px; border-bottom: 3px solid #00ffcc; }
        .nick { font-size: 20px; color: #00ffcc; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="color:#ff4b2b">RDX ID CHECKER</h2>
    <input type="number" id="uid" placeholder="Enter Player UID">
    <button onclick="checkID()">CHECK NAME</button>
    
    <div id="loader">Checking Garena Server...</div>

    <div id="res">
        <div style="font-size:11px; color:#888;">PLAYER NAME</div>
        <div id="pname" class="nick">---</div>
    </div>
</div>

<script>
    async function checkID() {
        const id = document.getElementById('uid').value;
        const loader = document.getElementById('loader');
        const resDiv = document.getElementById('res');
        const nameDiv = document.getElementById('pname');

        if(id.length < 5) { alert("Sahi UID dalo!"); return; }

        loader.style.display = "block";
        resDiv.style.display = "none";

        try {
            // Naya Stable API Link
            const response = await fetch(`https://freefire-api-five.vercel.app/api/freefire?id=${id}`);
            const data = await response.json();

            loader.style.display = "none";

            if(data.nickname || data.result) {
                nameDiv.innerText = data.nickname || data.result;
                resDiv.style.display = "block";
            } else {
                alert("ID nahi mili ya API limit khatam ho gayi.");
            }
        } catch(e) {
            loader.style.display = "none";
            alert("Network Error! Ek baar Airplane mode on-off karke try karein.");
        }
    }
</script>

</body>
</html>
