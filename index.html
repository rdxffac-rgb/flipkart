<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkert - Online Shopping</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background-color: #f1f3f6; }
        .header { background-color: #2874f0; color: white; padding: 10px 50px; display: flex; align-items: center; justify-content: space-between; }
        .logo { font-size: 24px; font-weight: bold; font-style: italic; }
        .search-bar { width: 40%; padding: 8px; border-radius: 2px; border: none; }
        .pay-later-btn { background-color: #fb641b; color: white; padding: 8px 15px; border: none; font-weight: bold; cursor: pointer; border-radius: 2px; }
        .main-content { text-align: center; padding: 50px; }
        .login-btn { background: white; color: #2874f0; padding: 10px 40px; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">Flipkert</div>
        <input type="text" class="search-bar" placeholder="Search for products, brands and more">
        <button class="pay-later-btn">Pay Later</button>
        <button class="login-btn">Login</button>
    </div>

    <div class="main-content">
        <h2>Welcome to Flipkert</h2>
        <p>Login to see trending items at cheapest prices!</p>
    </div>

</body>
</html>
