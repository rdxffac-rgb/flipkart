<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkert - Online Shopping</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background-color: #f1f3f6; overflow-x: hidden; }
        .header { background: #2874f0; color: white; padding: 12px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .pay-later { background: #ff9f00; padding: 5px 10px; border-radius: 2px; font-weight: bold; font-size: 12px; }
        
        /* Product Design */
        .product-container { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 8px; }
        .product-card { background: white; padding: 10px; border-radius: 2px; text-align: center; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .product-card img { width: 100%; height: 140px; object-fit: contain; }
        .price { color: #212121; font-weight: bold; font-size: 16px; margin: 5px 0; }
        .old-price { text-decoration: line-through; color: #878787; font-size: 12px; margin-left: 5px; }
        .buy-btn { background: #fb641b; color: white; border: none; width: 100%; padding: 10px; font-weight: bold; border-radius: 2px; cursor: pointer; }

        /* Login & Checkout Overlays */
        #loginOverlay, #checkoutPage { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; padding: 15px; box-sizing: border-box; display: block; overflow-y: auto; }
        #checkoutPage { display: none; background: #f1f3f6; }
        
        .card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 2px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        /* Payment Styles */
        .payment-option { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #eee; }
        .disabled-cod { color: #878787; font-size: 14px; display: flex; flex-direction: column; }
        .not-available { color: #d32f2f; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <h2 style="color:#2874f0; margin-bottom:5px;">Flipkert</h2>
    <p style="font-size:14px; color:#666;">Sign in to join the biggest sale!</p>
    <input type="text" id="userName" placeholder="Full Name">
    <textarea id="userAddress" placeholder="Full Address (House No, Building, Area, Pincode)" style="width:100%; height:80px; border:1px solid #ccc; padding:10px; border-radius:4px; box-sizing:border-box;"></textarea>
    <button onclick="getLocation()" style="background:#fff; border:1px solid #2874f0; color:#2874f0; padding:10px; width:100%; margin-top:5px; border-radius:4px;">📍 Use My Current Location</button>
    <input type="number" id="mobileNumber" placeholder="Enter Mobile Number">
    <button onclick="saveAndContinue()" style="background:#fb641b; color:white; border:none; padding:15px; width:100%; font-weight:bold; margin-top:20px; border-radius:2px;">CONTINUE</button>
</div>

<div class="header">
    <div style="font-style:italic; font-weight:bold; font-size:20px;">Flipkert</div>
    <div class="pay-later">Pay Later ⚡</div>
</div>

<div class="product-container">
    <div class="product-card">
        <img src="https://rukminim2.flixcart.com/image/312/312/xif0q/mobile/n/m/f/g34-5g-pb1v0002in-motorola-original-imagwu4rayun8ue6.jpeg">
        <div style="font-size:13px; height:32px; overflow:hidden;">Motorola G34 5G (8GB RAM)</div>
        <div class="price">₹499 <span class="old-price">₹14,999</span></div>
        <button class="buy-btn" onclick="openCheckout('Motorola G34 5G', '499')">BUY NOW</button>
    </div>
    <div class="product-card">
        <img src="https://rukminim2.flixcart.com/image/612/612/xif0q/smartwatch/5/v/s/-original-imagxp8vfy7r4y7h.jpeg">
        <div style="font-size:13px; height:32px; overflow:hidden;">Smart Watch S9 Ultra Max</div>
        <div class="price">₹199 <span class="old-price">₹3,999</span></div>
        <button class="buy-btn" onclick="openCheckout('Smart Watch S9', '199')">BUY NOW</button>
    </div>
</div>

<div id="checkoutPage">
    <div style="background:#2874f0; color:white; padding:15px; font-weight:bold;">Order Summary</div>
    
    <div class="card">
        <div style="font-weight:bold; font-size:14px; margin-bottom:5px;">Delivery to:</div>
        <div id="dispName" style="font-weight:bold;"></div>
        <div id="dispAddress" style="font-size:13px; color:#555;"></div>
        <div id="dispPhone" style="font-size:13px;"></div>
    </div>

    <div class="card">
        <div style="font-weight:bold; margin-bottom:10px;">Select Payment Method</div>
        
        <div class="payment-option">
            <input type="radio" name="pay" disabled>
            <div class="disabled-cod">
                <span>Cash on Delivery</span>
                <span class="not-available">NOT AVAILABLE FOR THIS ORDER</span>
            </div>
        </div>
        
        <div class="payment-option">
            <input type="radio" name="pay" checked>
            <div style="font-size:14px; margin-left:10px;">PhonePe / Google Pay / UPI</div>
        </div>

        <div class="payment-option">
            <input type="radio" name="pay">
            <div style="font-size:14px; margin-left:10px;">EMI (Easy Installments)</div>
        </div>
    </div>

    <button onclick="confirmOrder()" style="background:#fb641b; color:white; border:none; padding:15px; width:100%; font-weight:bold; position:fixed; bottom:0; left:0;">CONTINUE TO PAYMENT</button>
</div>

<script>
    let userDetails = {};
    let selectedProduct = "";

    function getLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((p) => {
                document.getElementById("userAddress").value = "Verified Location: Lat " + p.coords.latitude.toFixed(2) + ", Long " + p.coords.longitude.toFixed(2);
            });
        }
    }

    function saveAndContinue() {
        userDetails.name = document.getElementById("userName").value;
        userDetails.address = document.getElementById("userAddress").value;
        userDetails.phone = document.getElementById("mobileNumber").value;

        if(!userDetails.name || !userDetails.address || !userDetails.phone) {
            alert("Sabhi details bharna zaroori hai!"); return;
        }
        document.getElementById("loginOverlay").style.display = "none";
    }

    function openCheckout(name, price) {
        selectedProduct = name;
        document.getElementById("dispName").innerText = userDetails.name;
        document.getElementById("dispAddress").innerText = userDetails.address;
        document.getElementById("dispPhone").innerText = "+91 " + userDetails.phone;
        document.getElementById("checkoutPage").style.display = "block";
    }

    function confirmOrder() {
        alert("Redirecting to Secure Payment Gateway...");
        // Yahan aap apna UPI link ya QR code page daal sakte hain
    }
</script>

</body>
</html>
