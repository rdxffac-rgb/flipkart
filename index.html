<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce UI</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { background-color: #f1f3f6; }

        /* Header Tabs */
        .top-nav { display: flex; height: 50px; text-align: center; font-weight: bold; }
        .tab-flip { background: #fee115; flex: 1; display: flex; align-items: center; justify-content: center; }
        .tab-pay { background: #fff; flex: 1; display: flex; align-items: center; justify-content: center; color: #878787; border-bottom: 1px solid #ddd; }

        /* Search Bar */
        .search-container { background: #fff; padding: 10px; position: sticky; top: 0; z-index: 100; }
        .search-box { 
            display: flex; align-items: center; background: #f0f5ff; 
            border: 1px solid #2874f0; border-radius: 8px; padding: 8px 15px;
        }
        .search-box input { border: none; background: transparent; outline: none; width: 100%; font-size: 16px; margin-left: 10px; }

        /* Categories */
        .categories { display: flex; justify-content: space-around; background: #fff; padding: 15px 0; margin-bottom: 8px; }
        .cat-item { text-align: center; font-size: 12px; color: #333; }
        .cat-icon { width: 45px; height: 45px; margin-bottom: 5px; display: block; margin-left: auto; margin-right: auto; }

        /* Main Banner (f1.jpg) */
        .main-banner { width: 100%; padding: 5px; background: #fff; }
        .main-banner img { width: 100%; border-radius: 8px; display: block; }

        /* Horizontal Scroll (f2, f3, f4) */
        .horizontal-scroll { 
            display: flex; overflow-x: auto; background: #fff; padding: 15px 10px; 
            gap: 15px; scrollbar-width: none; 
        }
        .scroll-item { min-width: 110px; text-align: center; }
        .scroll-item img { width: 100px; height: 100px; border-radius: 10px; object-fit: cover; background: #f9f9f9; }
        .scroll-item p { font-size: 12px; margin-top: 8px; color: #444; }

        /* Grid Section (f5, f6, f7) */
        .grid-container { 
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; 
            padding: 10px; background: #fff; margin-top: 8px;
        }
        .grid-item { text-align: center; }
        .grid-item img { width: 100%; border-radius: 5px; aspect-ratio: 1/1.2; object-fit: cover; }
        .grid-item span { font-size: 11px; font-weight: bold; display: block; margin-top: 5px; color: #212121; }
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="tab-flip">Flipkert</div>
        <div class="tab-pay">Pay Later ⚡</div>
    </div>

    <div class="search-container">
        <div class="search-box">
            <span>🔍</span>
            <input type="text" placeholder="Search for watches, brands and more">
            <span>📷</span>
        </div>
    </div>

    <div class="categories">
        <div class="cat-item"><img src="mobile_icon.png" class="cat-icon">Mobiles</div>
        <div class="cat-item"><img src="beauty_icon.png" class="cat-icon">Beauty</div>
        <div class="cat-item"><img src="electronics_icon.png" class="cat-icon">Electronics</div>
    </div>

    <div class="main-banner">
        <img src="f1.jpg" alt="Special Offer Banner">
    </div>

    <div class="horizontal-scroll">
        <div class="scroll-item">
            <img src="f2.jpg" alt="Teethers">
            <p>Teethers</p>
        </div>
        <div class="scroll-item">
            <img src="f3.jpg" alt="Mosquito Killers">
            <p>Mosquito Killers</p>
        </div>
        <div class="scroll-item">
            <img src="f4.jpg" alt="Car Charger">
            <p>Car Mobile Ch...</p>
        </div>
        </div>

    <div class="grid-container">
        <div class="grid-item">
            <img src="f5.jpg" alt="Offer 1">
            <span>Spl. price ₹1,199</span>
        </div>
        <div class="grid-item">
            <img src="f6.jpg" alt="Offer 2">
            <span>Up to 50% Off</span>
        </div>
        <div class="grid-item">
            <img src="f7.jpg" alt="Offer 3">
            <span>Min. 70% Off</span>
        </div>
    </div>

</body>
</html>
