<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBFC BANK - Personal Loan Offer</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background-color: #f4f7f9; }
        .header { background: #003366; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: bold; font-size: 20px; border: 2px solid white; padding: 2px 8px; }
        .safe-tag { background: #28a745; color: white; padding: 5px 10px; border-radius: 20px; font-size: 12px; }
        
        .banner { background: #e3f2fd; padding: 20px; text-align: center; }
        .banner h2 { color: #d32f2f; margin: 5px 0; }
        
        .form-container { padding: 20px; background: white; margin-top: 10px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #555; font-size: 14px; }
        input[type="text"], input[type="date"], select {
            width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box;
        }
        
        .radio-group { display: flex; gap: 15px; margin-bottom: 15px; }
        .info-box { background: #fff9c4; border: 1px solid #fbc02d; padding: 10px; font-size: 13px; border-radius: 5px; margin-bottom: 20px; }
        
        .btn-submit {
            background: #9fa8da; color: white; border: none; width: 100%; padding: 15px;
            font-size: 16px; border-radius: 5px; cursor: pointer; font-weight: bold;
        }
        .footer { text-align: center; padding: 20px; font-size: 12px; color: #777; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">HBFC BANK</div>
    <div class="safe-tag">100% SAFE & SECURE</div>
</div>

<div class="banner">
    <p>Hey there!</p>
    <h2>Your Personal Loan Offer is waiting inside.</h2>
</div>

<div class="form-container">
    <h3>Welcome! Check your Personal Loan offer</h3>
    
    <div class="input-group">
        <label>Enter Registered Mobile Number</label>
        <input type="text" placeholder="+91 Enter Number">
    </div>

    <div class="radio-group">
        <label><input type="radio" name="id_type"> PAN Card</label>
        <label><input type="radio" name="id_type" checked> Date of Birth</label>
    </div>

    <div class="input-group">
        <input type="date">
    </div>

    <label>Your source of income</label>
    <div class="radio-group">
        <label><input type="radio" name="income" checked> Salaried</label>
        <label><input type="radio" name="income"> Self Employed</label>
    </div>

    <div class="info-box">
        Income verification or salary proof may be required for processing loan request.
    </div>

    <label>Are you a PEP?</label>
    <div class="radio-group">
        <label><input type="radio" name="pep"> Yes</label>
        <label><input type="radio" name="pep" checked> No</label>
    </div>

    <div style="font-size: 12px; color: #555; margin-bottom: 20px;">
        <input type="checkbox"> I hereby consent to processing of my data...
    </div>

    <button class="btn-submit">View Loan Eligibility</button>
</div>

<div class="footer">
    © Copyright HBFC Bank Ltd.
</div>

</body>
</html>
